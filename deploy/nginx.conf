# Nginx reverse proxy for the chat app.
# Install on the server with:
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/chat.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_SUBDOMAIN.duckdns.org with your actual DuckDNS domain.
# certbot will automatically add the HTTPS (443) server block when you run it.

server {
    listen 80;
    server_name YOUR_SUBDOMAIN.duckdns.org;

    # Must match the app's 5mb body limit so base64 image uploads succeed.
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        # --- WebSocket upgrade for Socket.io (required for real-time messaging) ---
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # --- Preserve client info so Express "trust proxy" + secure cookies work ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived socket connections open.
        proxy_read_timeout 86400;
    }
}
